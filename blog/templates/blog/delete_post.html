{% extends 'blog/base.html' %}
{% block title %}Delete Post — Medical Ethics Platform{% endblock %}

{% block content %}
<div class="action-card">
  <div class="action-card-icon danger"><i class="bi bi-trash"></i></div>
  <h3>Delete Post?</h3>
  <p>Are you sure you want to permanently delete <strong>"{{ post.title }}"</strong>? This action cannot be undone.</p>
  <form method="POST" class="d-flex justify-content-center gap-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i>Yes, Delete</button>
    <a href="{{ post.get_absolute_url }}" class="btn btn-outline-secondary px-4">Cancel</a>
  </form>
</div>
{% endblock %}
